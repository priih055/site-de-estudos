<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Aluno</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f0f0f0;
}

.topo {
  background: #073800;
  color: white;
  padding: 20px;
  text-align: center;
  font-size: 24px;
}

.container {
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

a {
  display: block;
  text-align: center;
  margin-top: 20px;
  text-decoration: none;
  color: #8B0000;
  font-weight: bold;
}
</style>
</head>

<body>

<script>
if (localStorage.getItem("tipo") !== "aluno") {
  window.location.href = "../index.html";
}
</script>

<div class="topo">Matérias da Semana</div>

<div class="container" id="lista"></div>

<a href="../index.html">Sair</a>

<script>
let lista = document.getElementById("lista");
let materias = JSON.parse(localStorage.getItem("materias")) || [];

materias.forEach((m) => {
  let div = document.createElement("div");
  div.className = "card";
  div.innerText = m;
  lista.appendChild(div);
});
</script>

</body>
</html>
